<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Projects by Hayden Williams." />
    <meta name="theme-color" content="#1e3c72" />
    <title>Hayden Williams | Projects</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="ambient ambient-one" aria-hidden="true"></div>
    <div class="ambient ambient-two" aria-hidden="true"></div>

    <div class="page-shell">
      <header class="site-header glass-panel">
        <a class="brand" href="/" aria-label="Hayden Williams projects home">
          <span class="brand-mark">HW</span>
          <span>Hayden Williams</span>
        </a>
        <span class="header-label">Projects</span>
      </header>

      <main>
        <section class="hero" aria-labelledby="page-title">
          <p class="eyebrow">HAYDENW-UK.GITHUB.IO</p>
          <h1 id="page-title">Ideas, made real.</h1>
          <p class="hero-copy">Small projects by Hayden Williams.</p>
          <div class="hero-actions">
            <a class="button button-primary" href="https://www.haydenwilliams.dev">
              Main website <span aria-hidden="true">↗</span>
            </a>
            <a class="button button-secondary" href="#projects">Projects <span aria-hidden="true">↓</span></a>
          </div>
        </section>

        <section class="projects-section glass-panel" id="projects" aria-labelledby="projects-title">
          <div class="section-heading">
            <div>
              <p class="eyebrow">SELECTED WORK</p>
              <h2 id="projects-title">Mini projects</h2>
            </div>
            <span class="project-count" id="project-count" aria-label="Number of projects">00</span>
          </div>

          <div class="project-list" id="project-list" aria-live="polite">
            <div class="loading-state">Loading projects<span class="loading-dots" aria-hidden="true">...</span></div>
          </div>
        </section>
      </main>

      <footer class="site-footer">
        <span>© <span id="current-year">2026</span> Hayden Williams</span>
        <a href="https://github.com/haydenw-uk">GitHub <span aria-hidden="true">↗</span></a>
      </footer>
    </div>
  </body>
</html>
