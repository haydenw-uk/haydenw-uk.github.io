<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Projects by Hayden Williams." />
    <meta name="theme-color" content="#1e3c72" />
    <title>Hayden Williams | Projects</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="ambient ambient-one" aria-hidden="true"></div>
    <div class="ambient ambient-two" aria-hidden="true"></div>

    <div class="page-shell">
      <header class="site-header glass-panel">
        <a class="brand" href="/" aria-label="Hayden Williams projects home">
          <span class="brand-mark">HW</span>
          <span>Hayden Williams</span>
        </a>
        <div class="header-nav">
          <span class="lab-status"><span class="status-dot" aria-hidden="true"></span>Lab online</span>
          <a class="header-link" href="https://www.haydenwilliams.dev">Main site <span aria-hidden="true">↗</span></a>
        </div>
      </header>

      <main>
        <section class="hero" aria-labelledby="page-title">
          <div class="hero-copy-block">
            <p class="eyebrow">01 / PROJECT LAB</p>
            <h1 id="page-title">Build.<br /><span>Test. Repeat.</span></h1>
            <p class="hero-copy">Experimental tools, products, and ideas.</p>
            <div class="hero-actions">
              <a class="button button-primary" href="#projects">Enter the lab <span aria-hidden="true">↓</span></a>
              <a class="button button-secondary" href="https://www.haydenwilliams.dev">Main site <span aria-hidden="true">↗</span></a>
            </div>
          </div>

          <div class="lab-console glass-panel" aria-label="Project Lab status console">
            <div class="console-top">
              <span>LAB.STATUS</span>
              <span class="console-online">ONLINE</span>
            </div>
            <div class="console-grid" aria-hidden="true"></div>
            <div class="console-orbit orbit-one" aria-hidden="true"></div>
            <div class="console-orbit orbit-two" aria-hidden="true"></div>
            <div class="console-core">
              <span class="core-mark">HW</span>
              <span class="core-label">EXPERIMENTAL</span>
            </div>
            <div class="console-bottom">
              <span>BUILD / 01</span>
              <span>OPEN / INPUT</span>
            </div>
          </div>
        </section>

        <section class="projects-section glass-panel" id="projects" aria-labelledby="projects-title">
          <div class="section-heading">
            <div>
              <p class="eyebrow">02 / LIVE INDEX</p>
              <h2 id="projects-title">Current builds</h2>
            </div>
            <span class="project-count" id="project-count" aria-label="Number of projects">00</span>
          </div>

          <div class="project-list" id="project-list" aria-live="polite">
            <div class="loading-state">Loading projects<span class="loading-dots" aria-hidden="true">...</span></div>
          </div>
        </section>
      </main>

      <footer class="site-footer">
        <span>Project Lab / <span id="current-year">2026</span></span>
        <a href="https://github.com/haydenw-uk">GitHub <span aria-hidden="true">↗</span></a>
      </footer>
    </div>
  </body>
</html>
